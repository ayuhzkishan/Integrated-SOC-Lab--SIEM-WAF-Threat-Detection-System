# ============================================
# Splunk Universal Forwarder — inputs.conf
# Monitors Apache, ModSecurity, and Suricata logs
# ============================================

[default]
host = soc-forwarder

# ----- Apache Access Log -----
[monitor:///var/log/apache2/access.log]
disabled = false
sourcetype = apache:access
index = soc
host = webserver

# ----- Apache Error Log -----
[monitor:///var/log/apache2/error.log]
disabled = false
sourcetype = apache:error
index = soc
host = webserver

# ----- ModSecurity Audit Log -----
[monitor:///var/log/modsec/modsec_audit.log]
disabled = false
sourcetype = modsec:audit
index = soc
host = webserver

# ----- Suricata EVE JSON -----
[monitor:///var/log/suricata/eve.json]
disabled = false
sourcetype = suricata:eve
index = soc
host = suricata
