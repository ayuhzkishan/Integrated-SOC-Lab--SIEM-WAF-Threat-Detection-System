# ============================================
# Splunk — transforms.conf
# Field extraction regex definitions
# ============================================

# ----- Apache Access Log Fields -----
[apache_access_extract]
REGEX = ^(\S+)\s+\S+\s+(\S+)\s+\[([^\]]+)\]\s+"(\S+)\s+(\S+)\s+\S+"\s+(\d+)\s+(\d+|-)\s+"([^"]*)"\s+"([^"]*)"
FORMAT = src_ip::$1 user::$2 http_method::$4 uri::$5 status::$6 bytes::$7 referer::$8 user_agent::$9

# ----- ModSecurity Rule ID -----
[modsec_rule_extract]
REGEX = \[id\s+"?(\d+)"?\]
FORMAT = modsec_rule_id::$1

# ----- ModSecurity Severity -----
[modsec_severity_extract]
REGEX = \[severity\s+"?(CRITICAL|ERROR|WARNING|NOTICE|INFO)"?\]
FORMAT = modsec_severity::$1

# ----- ModSecurity Message -----
[modsec_msg_extract]
REGEX = \[msg\s+"([^"]+)"\]
FORMAT = modsec_msg::$1

# ----- ModSecurity Action -----
[modsec_action_extract]
REGEX = Action:\s+(Intercepted|Passed|Denied|Dropped|Allowed)
FORMAT = modsec_action::$1

# ----- Threat Intel Lookup -----
[threat_intel_lookup]
filename = threat_intel.csv
match_type = CIDR(src_ip)
