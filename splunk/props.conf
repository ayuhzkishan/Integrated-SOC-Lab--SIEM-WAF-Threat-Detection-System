# ============================================
# Splunk — props.conf
# Field extraction and timestamp settings
# ============================================

# ----- Apache Access Log -----
[apache:access]
SHOULD_LINEMERGE = false
TIME_FORMAT = %d/%b/%Y:%H:%M:%S %z
TIME_PREFIX = \[
MAX_TIMESTAMP_LOOKAHEAD = 32
TRANSFORMS-apache = apache_access_extract

# ----- Apache Error Log -----
[apache:error]
SHOULD_LINEMERGE = false
TIME_FORMAT = %a %b %d %H:%M:%S.%6N %Y
MAX_TIMESTAMP_LOOKAHEAD = 40

# ----- ModSecurity Audit Log -----
[modsec:audit]
SHOULD_LINEMERGE = true
LINE_BREAKER = ([\r\n]+)--[a-f0-9]+-A--
BREAK_ONLY_BEFORE = --[a-f0-9]+-A--
TIME_FORMAT = %d/%b/%Y:%H:%M:%S %z
TIME_PREFIX = \[
MAX_TIMESTAMP_LOOKAHEAD = 32
TRANSFORMS-modsec = modsec_rule_extract, modsec_severity_extract, modsec_msg_extract, modsec_action_extract

# ----- Suricata EVE JSON -----
[suricata:eve]
SHOULD_LINEMERGE = false
KV_MODE = json
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N%z
TIME_PREFIX = "timestamp"\s*:\s*"
MAX_TIMESTAMP_LOOKAHEAD = 40
TRUNCATE = 999999
