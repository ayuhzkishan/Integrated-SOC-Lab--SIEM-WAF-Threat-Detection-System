# ============================================
# Splunk Saved Searches & Alerts — SOC Lab
# ============================================
# These 3 alerts implement Phase 7 of the project plan:
#   CRITICAL - WAF mass block from single IP
#   HIGH     - Suricata alert burst
#   MEDIUM   - Cross-layer correlation (same IP on WAF + NIDS)
#
# Each alert triggers a webhook POST to the Flask SOAR endpoint.
# ============================================

# ----- ALERT 1: CRITICAL — WAF Mass Block -----
# Fires when a single IP triggers 10+ ModSecurity blocks in 60 seconds.
# Simulates a high-velocity automated attack campaign detection.
[CRITICAL: WAF Mass Block Alert]
search = sourcetype="modsec:audit" \
    | rex field=_raw "client\s+(?P<src_ip>\d+\.\d+\.\d+\.\d+)" \
    | rex field=_raw "\[msg\s+\"(?P<modsec_msg>[^\"]+)\"\]" \
    | stats count as block_count dc(modsec_msg) as unique_rules values(modsec_msg) as triggered_rules by src_ip \
    | where block_count >= 10 \
    | eval severity="CRITICAL", alert_type="WAF_MASS_BLOCK" \
    | table src_ip block_count unique_rules triggered_rules severity alert_type
dispatch.earliest_time = -1m
dispatch.latest_time = now
is_scheduled = 1
cron_schedule = * * * * *
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 5
alert.suppress = 1
alert.suppress.period = 5m
alert.suppress.fields = src_ip
alert.track = 1
description = Fires when a single IP triggers 10+ WAF blocks in 60s. Indicates automated attack.
action.webhook = 1
action.webhook.param.url = http://172.20.0.60:5000/webhook/splunk
actions = webhook

# ----- ALERT 2: HIGH — Suricata Alert Burst -----
# Fires when Suricata generates 5+ alerts in a 2-minute window.
# Detects network-layer attack bursts that may bypass the WAF.
[HIGH: Suricata Alert Burst]
search = sourcetype="suricata:eve" event_type="alert" \
    | stats count as alert_count dc(alert.signature) as unique_sigs values(alert.signature) as signatures by src_ip \
    | where alert_count >= 5 \
    | eval severity="HIGH", alert_type="NIDS_BURST" \
    | table src_ip alert_count unique_sigs signatures severity alert_type
dispatch.earliest_time = -2m
dispatch.latest_time = now
is_scheduled = 1
cron_schedule = */2 * * * *
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 5m
alert.suppress.fields = src_ip
alert.track = 1
description = Fires when Suricata generates 5+ alerts in 2 minutes from a single source IP.
action.webhook = 1
action.webhook.param.url = http://172.20.0.60:5000/webhook/splunk
actions = webhook

# ----- ALERT 3: MEDIUM — Cross-Layer Correlation -----
# Fires when the same source IP is flagged by BOTH ModSecurity AND Suricata.
# This is the most resume-worthy detection — it demonstrates multi-source correlation.
[MEDIUM: Cross-Layer Correlation Alert]
search = (sourcetype="modsec:audit" OR (sourcetype="suricata:eve" event_type="alert")) \
    | rex field=_raw "client\s+(?P<waf_ip>\d+\.\d+\.\d+\.\d+)" \
    | eval src_ip=coalesce(waf_ip, src_ip) \
    | stats \
        count(eval(sourcetype=="modsec:audit")) as waf_hits \
        count(eval(sourcetype=="suricata:eve")) as nids_hits \
        values(eval(if(sourcetype=="modsec:audit", "WAF", null()))) as waf_layer \
        values(eval(if(sourcetype=="suricata:eve", "NIDS", null()))) as nids_layer \
        by src_ip \
    | where waf_hits > 0 AND nids_hits > 0 \
    | eval total_hits=waf_hits+nids_hits, severity="MEDIUM", alert_type="CROSS_LAYER" \
    | table src_ip waf_hits nids_hits total_hits severity alert_type
dispatch.earliest_time = -5m
dispatch.latest_time = now
is_scheduled = 1
cron_schedule = */5 * * * *
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = src_ip
alert.track = 1
description = Fires when the same IP triggers detections on both WAF and NIDS layers, indicating a multi-vector attack.
action.webhook = 1
action.webhook.param.url = http://172.20.0.60:5000/webhook/splunk
actions = webhook

# ----- ALERT 4: HIGH — Brute Force Detection -----
# Fires when 15+ POST requests to /login.php come from a single IP in 2 minutes.
[HIGH: Brute Force Login Detected]
search = sourcetype="apache:access" uri="/login.php" method="POST" \
    | stats count as login_attempts dc(status) as status_codes values(status) as http_statuses by src_ip \
    | where login_attempts >= 15 \
    | eval severity="HIGH", alert_type="BRUTE_FORCE" \
    | table src_ip login_attempts status_codes http_statuses severity alert_type
dispatch.earliest_time = -2m
dispatch.latest_time = now
is_scheduled = 1
cron_schedule = */2 * * * *
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = src_ip
alert.track = 1
description = Fires when 15+ login attempts from a single IP in 2 minutes, indicating credential stuffing or brute force.
action.webhook = 1
action.webhook.param.url = http://172.20.0.60:5000/webhook/splunk
actions = webhook

# ----- INFORMATIONAL: Threat Intel Match -----
# Fires when a source IP matches the AbuseIPDB threat intelligence lookup.
[INFO: Threat Intel IP Match]
search = (sourcetype="apache:access" OR sourcetype="modsec:audit" OR sourcetype="suricata:eve") \
    | rex field=_raw "(?P<src_ip>\d+\.\d+\.\d+\.\d+)" \
    | lookup threat_intel.csv src_ip OUTPUT ti_malicious ti_confidence ti_country \
    | where ti_malicious="true" \
    | stats count as hits values(sourcetype) as sources by src_ip ti_confidence ti_country \
    | eval severity="HIGH", alert_type="THREAT_INTEL_MATCH" \
    | table src_ip ti_confidence ti_country hits sources severity alert_type
dispatch.earliest_time = -15m
dispatch.latest_time = now
is_scheduled = 1
cron_schedule = */15 * * * *
enableSched = 1
counttype = number of events
quantity = 0
relation = greater than
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 60m
alert.suppress.fields = src_ip
alert.track = 1
description = Fires when traffic from a known malicious IP (AbuseIPDB) is detected across any log source.
action.webhook = 1
action.webhook.param.url = http://172.20.0.60:5000/webhook/splunk
actions = webhook
