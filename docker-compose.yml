# ============================================
# Integrated SOC Lab - Docker Compose
# ============================================
# Services:
#   splunk     - Splunk Enterprise 9.x (SIEM)
#   web        - Apache 2.4 + ModSecurity WAF + PHP
#   suricata   - Suricata 6.x NIDS
#   forwarder  - Splunk Universal Forwarder
#   attacker   - Python Attack Simulator
#   webhook    - Flask-based mock SOAR endpoint
# ============================================

services:

  # =========================================
  # Splunk Enterprise — Central SIEM
  # =========================================
  splunk:
    image: splunk/splunk:9.1
    container_name: soc-splunk
    hostname: splunk
    environment:
      - SPLUNK_START_ARGS=${SPLUNK_START_ARGS}
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD}
      - SPLUNK_HEC_SSL=false
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN}
    ports:
      - "8000:8000"   # Splunk Web UI
      - "8088:8088"   # HTTP Event Collector
      - "9997:9997"   # Forwarder receiving port
    volumes:
      - splunk-data:/opt/splunk/var
      - ./splunk/dashboards:/opt/splunk/etc/apps/soc_lab/local/data/ui/views
      - ./splunk/app.conf:/opt/splunk/etc/apps/soc_lab/default/app.conf
      - ./splunk/savedsearches.conf:/opt/splunk/etc/apps/soc_lab/local/savedsearches.conf
      - ./splunk/props.conf:/opt/splunk/etc/apps/soc_lab/local/props.conf
      - ./splunk/transforms.conf:/opt/splunk/etc/apps/soc_lab/local/transforms.conf
    networks:
      soc-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  # =========================================
  # Apache + ModSecurity WAF — Target Web App
  # =========================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: soc-web
    hostname: webserver
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - apache-logs:/var/log/apache2
      - modsec-logs:/var/log/modsec
    networks:
      soc-net:
        ipv4_address: 172.20.0.20
    restart: unless-stopped
    # Apache writes directly into the named volumes above

  # =========================================
  # Suricata NIDS — Network Intrusion Detection
  # =========================================
  suricata:
    image: jasonish/suricata:6.0
    container_name: soc-suricata
    hostname: suricata
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./suricata/rules:/var/lib/suricata/rules
      - suricata-logs:/var/log/suricata
    command: >
      -i eth0
      --set vars.address-groups.HOME_NET="[172.20.0.0/16]"
    restart: unless-stopped

  # =========================================
  # HEC Watcher — Real-time Log Shipper
  # Tails shared volumes and pushes to Splunk HEC every 5s
  # =========================================
  hec-watcher:
    build:
      context: ./hec_watcher
      dockerfile: Dockerfile
    container_name: soc-hec-watcher
    hostname: hec-watcher
    environment:
      - HEC_URL=http://soc-splunk:8088/services/collector/event
      - HEC_TOKEN=${SPLUNK_HEC_TOKEN}
      - INTERVAL=5
    volumes:
      - apache-logs:/logs/apache2:ro
      - modsec-logs:/logs/modsec:ro
      - suricata-logs:/logs/suricata:ro
    depends_on:
      splunk:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      soc-net:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  # =========================================
  # Python Attack Simulator — Red Team Agent
  # =========================================
  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: soc-attacker
    hostname: attacker
    depends_on:
      web:
        condition: service_started
    environment:
      - TARGET_URL=http://172.20.0.20
    networks:
      soc-net:
        ipv4_address: 172.20.0.50
    restart: "no"

  # =========================================
  # Webhook Receiver — Mock SOAR Endpoint
  # =========================================
  webhook:
    build:
      context: ./webhook
      dockerfile: Dockerfile
    container_name: soc-webhook
    hostname: webhook
    ports:
      - "${WEBHOOK_PORT:-5000}:5000"
    networks:
      soc-net:
        ipv4_address: 172.20.0.60
    restart: unless-stopped

# =========================================
# Networks
# =========================================
networks:
  soc-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# =========================================
# Volumes
# =========================================
volumes:
  splunk-data:
  apache-logs:
  modsec-logs:
  suricata-logs:
