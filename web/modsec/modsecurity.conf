# ============================================
# ModSecurity v2 — Main Configuration
# ============================================

# Engine on = blocking mode | DetectionOnly = log only
SecRuleEngine On

# Request body access (needed to inspect POST data)
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072

# Response body access (inspect server responses for data leaks)
SecResponseBodyAccess On
SecResponseBodyLimit 524288

# ----- Audit Logging -----
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogType Serial
SecAuditLog /var/log/modsec/modsec_audit.log
SecAuditLogParts ABIJDEFHZ

# ----- Debug Log (disabled in production) -----
SecDebugLog /var/log/modsec/modsec_debug.log
SecDebugLogLevel 0

# ----- Temp and Data dirs -----
SecTmpDir /tmp/
SecDataDir /tmp/

# ----- Default Actions -----
SecDefaultAction "phase:1,deny,log,status:403"
SecDefaultAction "phase:2,deny,log,status:403"

# ----- Argument separator -----
SecArgumentSeparator &

# ----- Cookie format (0 = Netscape) -----
SecCookieFormat 0

# ----- Unicode mapping -----
SecUnicodeMapFile /etc/modsecurity/unicode.mapping 20127
