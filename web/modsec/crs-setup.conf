# ============================================
# OWASP CRS v3.3+ Setup Configuration
# ============================================

# Paranoia Level (1=low, 2=default, 3=strict, 4=paranoid)
# Level 2 gives solid detection without excessive false positives
SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.crs_setup_version=330"
SecAction "id:900001,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"

# Detection Paranoia Level (threshold above which rules are skipped)
SecAction "id:900002,phase:1,nolog,pass,t:none,setvar:tx.detection_paranoia_level=2"

# ----- Anomaly Scoring Mode -----
# Inbound threshold: Requests scoring above this are blocked
SecAction "id:900110,phase:1,nolog,pass,t:none,setvar:tx.inbound_anomaly_score_threshold=5"

# Outbound threshold: Responses scoring above this are blocked
SecAction "id:900111,phase:1,nolog,pass,t:none,setvar:tx.outbound_anomaly_score_threshold=4"

# ----- Enable Anomaly Scoring -----
SecAction "id:900100,phase:1,nolog,pass,t:none,setvar:tx.anomaly_score=0,setvar:tx.sql_injection_score=0,setvar:tx.xss_score=0,setvar:tx.rfi_score=0,setvar:tx.lfi_score=0,setvar:tx.rce_score=0,setvar:tx.php_injection_score=0,setvar:tx.http_violation_score=0,setvar:tx.session_fixation_score=0"

# ----- Allowed HTTP Methods -----
SecAction "id:900200,phase:1,nolog,pass,t:none,setvar:'tx.allowed_methods=GET HEAD POST OPTIONS PUT DELETE'"

# ----- Allowed Content Types -----
SecAction "id:900220,phase:1,nolog,pass,t:none,setvar:'tx.allowed_request_content_type=|application/x-www-form-urlencoded| |multipart/form-data| |multipart/related| |text/xml| |application/xml| |application/soap+xml| |application/json| |application/cloudevents+json| |application/cloudevents-batch+json|'"

# ----- File Extension Restrictions -----
SecAction "id:900240,phase:1,nolog,pass,t:none,setvar:'tx.restricted_extensions=.asa/ .asax/ .ascx/ .backup/ .bak/ .bat/ .cdx/ .cer/ .cfg/ .cmd/ .com/ .config/ .conf/ .cs/ .csproj/ .csr/ .dat/ .db/ .dbf/ .dll/ .dos/ .htr/ .htw/ .ida/ .idc/ .idq/ .inc/ .ini/ .key/ .licx/ .lnk/ .log/ .mdb/ .old/ .pass/ .pdb/ .pol/ .printer/ .pwd/ .rdb/ .resources/ .resx/ .sql/ .swp/ .sys/ .vb/ .vbs/ .vbproj/ .vsdisco/ .webinfo/ .xsd/ .xsx/'"

# ----- GeoIP Database (optional) -----
