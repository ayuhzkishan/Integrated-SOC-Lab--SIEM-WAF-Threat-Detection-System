# ============================================
# Custom ModSecurity Rules - SOC Lab
# Application-specific detection rules
# ============================================

# ----- Rule 1: Block base64-encoded payloads in query strings -----
SecRule ARGS "@rx (?:[A-Za-z0-9+/]{4}){4,}(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?" \
    "id:100001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SOCLab: Base64-encoded payload detected in parameter',\
    tag:'custom/base64-payload',\
    tag:'OWASP_CRS',\
    severity:'CRITICAL',\
    logdata:'%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'"

# ----- Rule 2: Block common webshell keywords -----
SecRule REQUEST_BODY "@rx (?:eval\s*\(|exec\s*\(|system\s*\(|passthru\s*\(|shell_exec\s*\(|popen\s*\(|proc_open\s*\()" \
    "id:100002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SOCLab: Webshell/command execution function detected',\
    tag:'custom/webshell',\
    tag:'attack-rce',\
    severity:'CRITICAL',\
    logdata:'%{MATCHED_VAR}'"

# ----- Rule 3: Detect directory traversal with encoding evasion -----
SecRule REQUEST_URI "@rx (?:%2e%2e[/\\\\]|\.\.(?:%2f|%5c)|%252e%252e)" \
    "id:100003,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'SOCLab: Encoded directory traversal attempt',\
    tag:'custom/dir-traversal',\
    tag:'attack-lfi',\
    severity:'HIGH',\
    logdata:'%{REQUEST_URI}'"

# ----- Rule 4: Rate limiting - Brute force protection -----
SecRule IP:bf_counter "@ge 10" \
    "id:100004,\
    phase:1,\
    deny,\
    status:429,\
    log,\
    msg:'SOCLab: Brute force threshold exceeded (10 req/min to login)',\
    tag:'custom/brute-force',\
    tag:'attack-credential',\
    severity:'HIGH'"

SecRule REQUEST_URI "@streq /login.php" \
    "id:100005,\
    phase:1,\
    pass,\
    nolog,\
    setvar:IP.bf_counter=+1,\
    expirevar:IP.bf_counter=60"

# ----- Rule 5: Block User-Agent strings known for scanning tools -----
SecRule REQUEST_HEADERS:User-Agent "@rx (?:nikto|sqlmap|nmap|dirbuster|gobuster|wfuzz|hydra|burp|zap|masscan)" \
    "id:100006,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'SOCLab: Known scanning tool User-Agent detected',\
    tag:'custom/scanner-detection',\
    tag:'attack-reputation',\
    severity:'WARNING',\
    logdata:'%{REQUEST_HEADERS.User-Agent}'"

# ----- Rule 6: Block exfiltration patterns in responses -----
SecRule RESPONSE_BODY "@rx (?:root:[x*]:0:0|(?:[0-9]{3}-?){3}[0-9]{4}|(?:[0-9]{4}[- ]?){4})" \
    "id:100007,\
    phase:4,\
    deny,\
    status:500,\
    log,\
    msg:'SOCLab: Sensitive data pattern in response (passwd/SSN/CC)',\
    tag:'custom/data-leak',\
    tag:'attack-disclosure',\
    severity:'CRITICAL',\
    logdata:'Sensitive data exposure detected'"
