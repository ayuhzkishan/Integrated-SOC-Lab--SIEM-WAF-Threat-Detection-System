# ============================================
# Suricata 6.x Configuration — SOC Lab
# ============================================

%YAML 1.1
---

vars:
  address-groups:
    HOME_NET: "[172.20.0.0/16]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "[172.20.0.20]"
  port-groups:
    HTTP_PORTS: "80"
    SHELLCODE_PORTS: "!80"

# ----- Logging -----
default-log-dir: /var/log/suricata/

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      pcap-file: false
      community-id: true
      types:
        - alert:
            payload: yes
            payload-printable: yes
            packet: yes
            metadata: yes
            http-body: yes
            http-body-printable: yes
            tagged-packets: yes
        - http:
            extended: yes
        - dns:
            enabled: yes
        - tls:
            extended: yes
        - files:
            force-magic: yes
        - stats:
            totals: yes
            threads: no
            deltas: no

  - fast:
      enabled: yes
      filename: fast.log

  - stats:
      enabled: yes
      filename: stats.log
      append: yes
      totals: yes
      threads: no

# ----- Detection Engine -----
detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto

# ----- App Layer Protocols -----
app-layer:
  protocols:
    http:
      enabled: yes
      libhtp:
        default-config:
          personality: Apache_2
          request-body-limit: 131072
          response-body-limit: 131072
          request-body-minimal-inspect-size: 32768
          request-body-inspect-window: 4096
          response-body-minimal-inspect-size: 40960
          response-body-inspect-window: 16384
    tls:
      enabled: yes
    dns:
      tcp:
        enabled: yes
      udp:
        enabled: yes

# ----- Rule files -----
default-rule-path: /var/lib/suricata/rules
rule-files:
  - custom.rules

# ----- AF-PACKET settings -----
af-packet:
  - interface: docker0
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes

# ----- Threading -----
threading:
  set-cpu-affinity: no
  detect-thread-ratio: 1.0

# ----- Stream engine -----
stream:
  memcap: 64mb
  checksum-validation: yes
  reassembly:
    memcap: 256mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560
